# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
# auto-reload when files change (`watch: false` to disable)
watch:
  - .trmnlp.yml
  - src

time_zone: Australia/Brisbane

# values of custom fields (defined in src/settings.yml)
custom_fields:
  {
    "period": "custom_range",
    "custom_range_start_date": "2026-02-01",
    "custom_range_end_date": "2026-02-03",
  }

# override variables
variables:
  trmnl: {}
  testing_date_time: "2026-02-02T12:00:00" # Midday on 2nd Feb 2026, which is within the custom range
