# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
# auto-reload when files change (`watch: false` to disable)
watch:
  - .trmnlp.yml
  - src

time_zone: Australia/Brisbane

# values of custom fields (defined in src/settings.yml)
custom_fields: { "period": "year" } # Year view
# override variables
variables:
  trmnl: {}
  testing_date_time: "2026-07-02T12:00:00" # Midday 2 July, so we are halfway through the year
